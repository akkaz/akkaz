<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  html, body { margin:0; padding:0; width:1280px; height:320px; overflow:hidden; }
  :root { --brand:#ff4017; }

  .stage{
    position:relative; width:1280px; height:320px;
    background:#09090b;
    font-family:'Geist Mono', monospace;
    color:#e4e4e7;
  }
  /* faint scanline texture */
  .stage::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom,
      rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
      transparent 1px, transparent 3px);
    pointer-events:none;
  }
  /* ASCII dashed corners */
  .corner{ position:absolute; font-size:22px; line-height:1; color:rgba(63,63,70,0.55); letter-spacing:2px; z-index:2; }
  .corner.tl{ top:22px; left:30px; } .corner.tr{ top:22px; right:30px; }
  .corner.bl{ bottom:22px; left:30px; } .corner.br{ bottom:22px; right:30px; }

  /* window chrome bar */
  .bar{ position:absolute; top:40px; left:72px; right:72px; display:flex; align-items:center; gap:14px; z-index:3; }
  .dots{ display:flex; gap:8px; }
  .dots span{ width:11px; height:11px; border-radius:50%; background:#27272a; border:1px solid rgba(63,63,70,0.7); }
  .dots span.live{ background:var(--brand); border-color:var(--brand); }
  .bar .title{ font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#52525b; }
  .bar .right{ margin-left:auto; font-size:11px; letter-spacing:0.04em; color:#52525b; }
  .bar .right .pre{ color:var(--brand); }

  .term{ position:absolute; top:104px; left:118px; z-index:3; }
  .promptline{ font-size:18px; color:#71717a; margin-bottom:22px; }
  .promptline .user{ color:var(--brand); }
  .promptline .path{ color:#a1a1aa; }
  .promptline .cmd{ color:#e4e4e7; }

  .name{ font-size:46px; font-weight:600; letter-spacing:-0.02em; color:#fafafa; line-height:1.05; margin:0 0 16px 0; }
  .name .dot{ color:var(--brand); }
  .role{ font-size:17px; color:#a1a1aa; margin:0 0 22px 0; }
  .role .arrow{ color:#52525b; }
  .tagline{ font-size:15px; color:#71717a; }
  .tagline .cur{ color:var(--brand); font-weight:600; }

  /* right meta column */
  .meta{ position:absolute; top:112px; right:96px; text-align:right; z-index:3; }
  .meta .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:#52525b; margin-bottom:12px; display:flex; align-items:center; justify-content:flex-end; gap:8px; }
  .meta .lbl .b{ width:5px; height:5px; background:var(--brand); display:inline-block; }
  .meta .site{ font-size:20px; color:#e4e4e7; letter-spacing:0.02em; }
  .meta .site .pre{ color:var(--brand); }
  .meta .loc{ margin-top:14px; font-size:12px; color:#71717a; letter-spacing:0.04em; }
  .meta .chips{ margin-top:20px; display:flex; gap:8px; justify-content:flex-end; }
  .meta .chip{ font-size:11px; color:#a1a1aa; border:1px solid rgba(63,63,70,0.6); border-radius:6px; padding:4px 9px; }
  .meta .chip .b{ color:var(--brand); }
</style>
</head>
<body>
  <div class="stage">
    <span class="corner tl">&#9484;</span>
    <span class="corner tr">&#9488;</span>
    <span class="corner bl">&#9492;</span>
    <span class="corner br">&#9496;</span>

    <div class="bar">
      <span class="dots"><span></span><span></span><span class="live"></span></span>
      <span class="title">akkaz.dev &mdash; shell</span>
      <span class="right"><span class="pre">~/</span>github.com/akkaz</span>
    </div>

    <div class="term">
      <div class="promptline">
        <span class="user">akkaz@valcamonica</span><span class="path">:~$</span> <span class="cmd">whoami</span>
      </div>
      <h1 class="name">Gio Marco Baglioni<span class="dot">.</span></h1>
      <div class="role"><span class="arrow">&gt;</span> AI Engineer &middot; Full-Stack Developer</div>
      <div class="tagline">Dall'idea all'agente in produzione<span class="cur">_</span></div>
    </div>

    <div class="meta">
      <div class="lbl"><span class="b"></span> stack</div>
      <div class="chips" style="flex-direction:column; align-items:flex-end; gap:10px;">
        <span class="chip"><span class="b">+</span> Multi-agent &middot; RAG &middot; MCP</span>
        <span class="chip"><span class="b">+</span> Python &middot; Next.js &middot; Drupal</span>
        <span class="chip"><span class="b">+</span> Hackapizza 4&deg;/26</span>
      </div>
    </div>
  </div>
</body>
</html>
